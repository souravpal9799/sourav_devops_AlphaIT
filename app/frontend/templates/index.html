<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Full-Stack App Status</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h1 { color: #1a1a2e; }
    .status { padding: 0.5rem 0; }
    .ok { color: #0a7; }
    .error { color: #c00; }
  </style>
</head>
<body>
  <h1>Full-Stack App Status</h1>
  <div class="status">
    <strong>Backend Health:</strong> <span class="{{ backend_health_class }}">{{ backend_health }}</span>
  </div>
  <div class="status">
    <strong>Backend Ready:</strong> <span class="{{ backend_ready_class }}">{{ backend_ready }}</span>
  </div>
  <div class="status">
    <strong>Frontend Docker Image Version:</strong> {{ docker_image_version }}
  </div>
</body>
</html>
