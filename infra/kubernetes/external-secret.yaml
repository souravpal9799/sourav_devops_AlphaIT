apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: backend-db-credentials
  namespace: demo-namespace
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: backend-db-credentials
    creationPolicy: Owner
  data:
    - secretKey: DB_USER
      remoteRef:
        key: $RDS_SECRET_NAME
        property: DB_USER
    - secretKey: DB_PASSWORD
      remoteRef:
        key: $RDS_SECRET_NAME
        property: DB_PASSWORD
    - secretKey: DB_HOST
      remoteRef:
        key: $RDS_SECRET_NAME
        property: DB_HOST
    - secretKey: DB_PORT
      remoteRef:
        key: $RDS_SECRET_NAME
        property: DB_PORT
    - secretKey: DB_NAME
      remoteRef:
        key: $RDS_SECRET_NAME
        property: DB_NAME
