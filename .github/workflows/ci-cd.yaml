name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  ECR_FRONTEND: frontend-app
  ECR_BACKEND: backend-app
  EKS_CLUSTER: demo-devops-cluster
  TF_DIR: infra/terraform
  IMAGE_TAG: "v1.0.${{ github.run_number }}"

jobs:
# ==============================================================
# STAGE 0 - Approval Gates (Upfront)
# ==============================================================
  terraform-approval:
    name: Approve Terraform Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: terraform-approval
    steps:
      - name: Approval gate passed
        run: echo "OK - Terraform deployment approved."

  k8s-approval:
    name: Approve K8s Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: k8s-approval
    steps:
      - name: Approval gate passed
        run: echo "OK - Kubernetes deployment approved."

# ==============================================================
# STAGE 1 - Terraform Infrastructure Plan & Apply
# ==============================================================
  terraform-deploy:
    name: Terraform Plan & Apply
    needs: terraform-approval
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      rds_secret_name: ${{ steps.set-outputs.outputs.rds_secret_name }}
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Auto-generate S3 Backend Config
        run: |
          echo "Generating backend configuration with AWS account ID..."
          bash setup-backend.sh
          echo "Backend configuration generated"

      - name: Terraform Init with S3 Backend
        run: terraform init -reconfigure -backend-config=backend-config.hcl -input=false -lock=false

      - name: Terraform Plan
        run: |
          terraform plan \
            -var="project_name=demo-devops" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -out=tfplan \
            -input=false
        env:
          TF_IN_AUTOMATION: true

      - name: Terraform Apply
        run: |
          terraform apply -input=false -lock=false tfplan
        env:
          TF_IN_AUTOMATION: true

      - name: Set Terraform Outputs
        id: set-outputs
        run: |
          SECRET_NAME=$(terraform output -raw rds_secret_name)
          echo "rds_secret_name=$SECRET_NAME" >> $GITHUB_OUTPUT

# ==============================================================
# STAGE 2 - Build & Push Docker Images
# ==============================================================
  lint-and-build:
    name: Lint, Build & Push
    needs: [terraform-deploy, k8s-approval]
    if: |
      always() && 
      (needs.terraform-deploy.result == 'success' || needs.terraform-deploy.result == 'skipped' || needs.terraform-deploy.result == 'cancelled') && 
      needs.k8s-approval.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Lint Backend
        run: |
          pip install flake8 black
          black backend/app/ || true
          flake8 backend/app/ || true

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Lint Frontend
        run: |
          cd frontend
          npm install
          npm run lint || true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build and Push Images
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_FRONTEND:$IMAGE_TAG ./frontend
          docker build -t $ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG ./backend
          docker push $ECR_REGISTRY/$ECR_FRONTEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG

# ==============================================================
# STAGE 3 - Kubernetes Deploy
# ==============================================================
  k8s-deploy:
    name: Deploy to EKS
    needs: lint-and-build
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.lint-and-build.result == 'success'
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update KubeConfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f infra/kubernetes/namespace.yaml
          kubectl apply -f infra/kubernetes/service.yaml
          kubectl apply -f infra/kubernetes/ingress.yaml

      - name: Apply External Secrets Manifests
        env:
          RDS_SECRET_NAME: ${{ needs.terraform-deploy.outputs.rds_secret_name }}
        run: |
          kubectl apply -f infra/kubernetes/cluster-secret-store.yaml
          envsubst < infra/kubernetes/external-secret.yaml | kubectl apply -f -

      - name: Deploy Application
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          export BACKEND_IMAGE="$ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG"
          export FRONTEND_IMAGE="$ECR_REGISTRY/$ECR_FRONTEND:$IMAGE_TAG"
          envsubst < infra/kubernetes/backend-deployment.yaml  | kubectl apply -f -
          envsubst < infra/kubernetes/frontend-deployment.yaml | kubectl apply -f -

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/backend  -n demo-namespace --timeout=5m
          kubectl rollout status deployment/frontend -n demo-namespace --timeout=5m
