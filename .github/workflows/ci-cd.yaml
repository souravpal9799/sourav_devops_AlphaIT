name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AWS_REGION: ap-south-1
  ECR_FRONTEND: frontend-app
  ECR_BACKEND: backend-app
  EKS_CLUSTER: demo-devops-cluster
  TF_DIR: infra/terraform

# ──────────────────────────────────────────────────────────────
# STAGE 1 – Lint, Build, Scan, Push to ECR
# ──────────────────────────────────────────────────────────────
jobs:
  lint-and-build:
    name: 🔍 Lint, Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.set_tag.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Lint Backend
        run: |
          pip install flake8 black
          black backend/app/
          flake8 backend/app/

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Lint Frontend
        run: |
          cd frontend
          npm install
          npm run lint

      - name: Build Docker Images
        run: |
          docker build -t $ECR_FRONTEND:latest ./frontend
          docker build -t $ECR_BACKEND:latest ./backend

      - name: Trivy Scan Frontend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.ECR_FRONTEND }}:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Wait for Trivy DB Cache
        run: sleep 15

      - name: Trivy Scan Backend
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.ECR_BACKEND }}:latest'
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set image tag output
        id: set_tag
        run: echo "image_tag=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Push Images to ECR
        if: github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.set_tag.outputs.image_tag }}
        run: |
          docker tag $ECR_FRONTEND:latest $ECR_REGISTRY/$ECR_FRONTEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_FRONTEND:$IMAGE_TAG
          docker tag $ECR_BACKEND:latest $ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG

# ──────────────────────────────────────────────────────────────
# APPROVAL GATE 1 – Terraform Deployment Approval
# Reviewers: go to Actions → this run → "Review pending deployments"
# Choose:  ✅ Approve (Deploy)  |  ⏭ Skip  |  ❌ Reject (Cancel)
# ──────────────────────────────────────────────────────────────
  terraform-approval:
    name: 🛂 Approve Terraform Deploy
    needs: lint-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    # This job blocks until a reviewer approves in the GitHub UI.
    # To SKIP terraform, reject here and manually trigger only the k8s job.
    # To CANCEL the whole pipeline, dismiss/reject without re-running.
    environment:
      name: terraform-approval    # ← Create this Environment in repo Settings → Environments
    steps:
      - name: Approval gate passed
        run: echo "✅ Terraform deployment approved."

# ──────────────────────────────────────────────────────────────
# STAGE 2 – Terraform Plan & Apply
# ──────────────────────────────────────────────────────────────
  terraform-deploy:
    name: 🏗️ Terraform Plan & Apply
    needs: terraform-approval
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: ${{ env.TF_DIR }}
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="project_name=demo-devops" \
            -var="aws_region=${{ env.AWS_REGION }}" \
            -out=tfplan \
            -input=false
        env:
          TF_IN_AUTOMATION: true

      - name: Show Plan Summary
        run: terraform show -no-color tfplan

      - name: Terraform Apply
        run: terraform apply -auto-approve -input=false tfplan
        env:
          TF_IN_AUTOMATION: true

# ──────────────────────────────────────────────────────────────
# APPROVAL GATE 2 – Kubernetes Deployment Approval
# ──────────────────────────────────────────────────────────────
  k8s-approval:
    name: 🛂 Approve K8s Deploy
    needs: lint-and-build     # ← Only depends on build; Terraform is independent
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: k8s-approval      # ← Create this Environment in repo Settings → Environments
    steps:
      - name: Approval gate passed
        run: echo "✅ Kubernetes deployment approved."

# ──────────────────────────────────────────────────────────────
# STAGE 3 – Kubernetes Deploy (ESO manifests + App Deployment)
# ──────────────────────────────────────────────────────────────
  k8s-deploy:
    name: 🚀 Deploy to EKS
    needs:
      - k8s-approval
      - terraform-deploy      # Ensures CRDs are installed before applying ESO manifests
    runs-on: ubuntu-latest
    if: |
      always() &&
      needs.k8s-approval.result == 'success' &&
      (needs.terraform-deploy.result == 'success' || needs.terraform-deploy.result == 'skipped')
    env:
      IMAGE_TAG: ${{ needs.lint-and-build.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update KubeConfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      # ── Apply ESO manifests FIRST (ClusterSecretStore + ExternalSecret) ──
      - name: Apply External Secrets Manifests
        run: |
          kubectl apply -f infra/kubernetes/cluster-secret-store.yaml
          kubectl apply -f infra/kubernetes/external-secret.yaml

      - name: Wait for ExternalSecret to sync
        run: |
          echo "Waiting for ExternalSecret to sync into a Kubernetes Secret..."
          for i in $(seq 1 12); do
            STATUS=$(kubectl get externalsecret backend-db-credentials -n demo-namespace \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].reason}' 2>/dev/null || echo "NotFound")
            echo "  Attempt $i/12 → Status: $STATUS"
            if [ "$STATUS" = "SecretSynced" ]; then
              echo "✅ Secret synced successfully."
              exit 0
            fi
            sleep 10
          done
          echo "❌ ExternalSecret did not sync within 2 minutes."
          kubectl describe externalsecret backend-db-credentials -n demo-namespace
          exit 1

      # ── Deploy Application ──
      - name: Substitute Image Tags
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          sed -i "s|<FRONTEND_IMAGE>|$ECR_REGISTRY/$ECR_FRONTEND:$IMAGE_TAG|g" infra/kubernetes/frontend-deployment.yaml
          sed -i "s|<BACKEND_IMAGE>|$ECR_REGISTRY/$ECR_BACKEND:$IMAGE_TAG|g" infra/kubernetes/backend-deployment.yaml

      - name: Apply Kubernetes Manifests
        run: |
          kubectl apply -f infra/kubernetes/namespace.yaml
          kubectl apply -R -f infra/kubernetes/

      - name: Wait for Rollout
        run: |
          kubectl rollout status deployment/backend  -n demo-namespace --timeout=5m
          kubectl rollout status deployment/frontend -n demo-namespace --timeout=5m

# ──────────────────────────────────────────────────────────────
# STAGE 4 – Smoke Test
# ──────────────────────────────────────────────────────────────
  smoke-test:
    name: 🧪 Smoke Test
    needs: k8s-deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update KubeConfig
        run: aws eks update-kubeconfig --name ${{ env.EKS_CLUSTER }} --region ${{ env.AWS_REGION }}

      - name: Run Smoke Test
        run: |
          ALB_URL=$(kubectl get service frontend -n demo-namespace \
            -o jsonpath='{.status.loadBalancer.ingress[0].hostname}')
          echo "Testing ALB: $ALB_URL"
          curl -f --retry 5 --retry-delay 10 http://$ALB_URL/health || exit 1
          curl -f --retry 5 --retry-delay 10 http://$ALB_URL/api/health || exit 1
          echo "✅ Smoke test passed."
