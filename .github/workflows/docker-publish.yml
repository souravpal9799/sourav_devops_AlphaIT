name: Build and push Docker images to GHCR

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./app/backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/backend:v${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./app/frontend
          push: true
          build-args: |
            DOCKER_IMAGE_VERSION=v${{ github.run_number }}
          tags: |
            ${{ env.REGISTRY }}/${{ github.repository_owner }}/frontend:v${{ github.run_number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifest-repo:
    name: Update image tags in manifest repo
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()
    permissions:
      contents: write  # for git push
    env:
      REGISTRY: ghcr.io
      MANIFEST_REPO: https://github.com/souravpal9799/sourav-kube-manifest.git
      OWNER: ${{ github.repository_owner }}
      TAG: v${{ github.run_number }}

    steps:
      - name: Checkout manifest repo
        uses: actions/checkout@v4
        with:
          repository: souravpal9799/sourav-kube-manifest
          token: ${{ secrets.MANIFEST_REPO_TOKEN }}
          path: manifest-repo
          fetch-depth: 0

      - name: Update image tags in manifest repo
        run: |
          OWNER="${{ github.repository_owner }}"
          TAG="v${{ github.run_number }}"
          cd manifest-repo
          echo "Updating image tags to ${TAG} for ${OWNER} in all YAML files..."
          while IFS= read -r -d '' f; do
            sed -i "s|\(image:.*ghcr.io/${OWNER}/backend:\)[^[:space:]]*|\1${TAG}|g" "$f" 2>/dev/null || true
            sed -i "s|\(image:.*ghcr.io/${OWNER}/frontend:\)[^[:space:]]*|\1${TAG}|g" "$f" 2>/dev/null || true
          done < <(find . -type f \( -name '*.yaml' -o -name '*.yml' \) -print0)
          echo "Updated image references:"
          grep -r "image:.*ghcr.io" --include='*.yaml' --include='*.yml' . 2>/dev/null || true

      - name: Commit and push to manifest repo
        run: |
          cd manifest-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git status
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git add -A
            git commit -m "chore: update image tags to ${{ env.TAG }} (build ${{ github.run_number }})"
            git push
          fi
